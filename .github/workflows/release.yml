name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: lanclip-windows-x64-installer.exe
          - name: macos-apple-silicon
            os: macos-14
            target: aarch64-apple-darwin
            asset: lanclip-macos-apple-silicon.dmg
          - name: macos-intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            asset: lanclip-macos-intel.dmg

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release -p lanclip-ui --bins --target ${{ matrix.target }}

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x packaging/macos/create_dmg.sh scripts/make_icons.py
          packaging/macos/create_dmg.sh "${{ matrix.target }}" "dist/${{ matrix.asset }}"

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if ($version -eq "main" -or [string]::IsNullOrWhiteSpace($version)) { $version = "0.1.0" }
          $parts = @()
          foreach ($part in ($version -split '\.')) {
            if ($part -match '^\d+$') { $parts += $part } else { $parts += "0" }
          }
          while ($parts.Count -lt 4) { $parts += "0" }
          $versionQuad = ($parts[0..3] -join ".")
          $stage = (Resolve-Path ".").Path + "\dist\stage-${{ matrix.name }}"
          $icons = (Resolve-Path ".").Path + "\dist\icons"
          New-Item -ItemType Directory -Force $stage, $icons | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lanclip.exe" "$stage\"
          Copy-Item "target/${{ matrix.target }}/release/lanclip-control.exe" "$stage\"
          Copy-Item "README.md" "$stage\"
          Copy-Item "LICENSE" "$stage\"
          Copy-Item "crates/lanclip-ui/assets/icons/lanclip.svg" "$stage\"
          python scripts/make_icons.py --ico "$stage\lanclip.ico"
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (!(Test-Path $makensis)) { $makensis = "makensis" }
          & $makensis `
            "/DAPP_VERSION=$version" `
            "/DAPP_VERSION_QUAD=$versionQuad" `
            "/DSTAGE_DIR=$stage" `
            "/DOUTPUT_EXE=$((Resolve-Path ".").Path)\dist\${{ matrix.asset }}" `
            "/DICON_PATH=$stage\lanclip.ico" `
            "packaging\windows\lanclip.nsi"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Delete older releases
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                [ "$tag" = "$TAG_NAME" ] && continue
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
              done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "lanclip $TAG_NAME" \
            --notes "Automated lanclip installer release for Windows, macOS Apple Silicon, and macOS Intel."
